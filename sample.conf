# woute config — ~/.config/woute/woute.conf
# See README.md for full documentation

# ── General ──────────────────────────────────────────────
[General]
socks5-listen = 7890              # localhost only (127.0.0.1:7890)
# socks5-listen = 0.0.0.0:7890    # accept from LAN too
log-level     = warning           # debug | info | warning | error
log-retention = 7                 # days to keep logs (0 = keep all)
dns           = 1.1.1.1, 1.0.0.1  # DNS for tunneled traffic — resolved THROUGH the tunnel
                                  #   (prevents hostname leak to ISP). direct/block use system DNS.

# ── Tunnel Groups ─────────────────────────────────────────
# Named sets of tunnels for automatic failover.
# Members are tried in order; first with a handshake < 3 min wins.
# To change priority, reorder members and restart.
[Tunnel Group]
VPN = Taiwan, Japan

# ── Tunnels ──────────────────────────────────────────────
[Tunnel: Taiwan]
private-key = YOUR_PRIVATE_KEY        # your WireGuard private key (from the VPN provider)
address     = 10.14.0.2               # your local IP inside the tunnel (assigned by the peer)
# dns       = 10.0.0.1                # optional; DNS to use for traffic routed through this
                                      #   tunnel (overrides [General] dns)
public-key  = PEER_PUBLIC_KEY         # the peer's public key
endpoint    = wg-tw.example.com:51820 # the peer's hostname:udp-port
allowed-ips = 0.0.0.0/0               # destination IPs this tunnel will carry (0.0.0.0/0 = all)

[Tunnel: Japan]
private-key = YOUR_PRIVATE_KEY
address     = 10.14.0.3               # your side of the Japan tunnel (must differ from Taiwan)
public-key  = PEER_PUBLIC_KEY
endpoint    = wg-jp.example.com:51820
allowed-ips = 0.0.0.0/0

# ── Rules ────────────────────────────────────────────────
# Evaluated top-to-bottom, first match wins.
# Left side = what to match, right side = where to send.
[Rule]

# Private networks — always direct
127.0.0.0/8      -> direct
10.0.0.0/8       -> direct
192.168.0.0/16   -> direct

# Block ads / trackers
*.ads.example.com -> block
*tracker*         -> block

# Route through VPN group
*.example.com    -> VPN
*.example.org    -> VPN

# Or route directly to a specific tunnel
# *.video.example.net -> Japan

# Everything else
default          -> direct
